# ============================================
# Nginx 配置 - 玉石知识平台
# 在宝塔面板 → 网站 → 设置 → 配置文件 中使用
# ============================================

server {
    listen 80;
    server_name jade-knowledge.com www.jade-knowledge.com;  # 改成你的域名

    # SSL（宝塔一键申请后取消注释）
    # listen 443 ssl;
    # ssl_certificate /www/server/panel/vhost/cert/jade-knowledge.com/fullchain.pem;
    # ssl_certificate_key /www/server/panel/vhost/cert/jade-knowledge.com/privkey.pem;

    # 前端静态文件
    root /www/wwwroot/jade-knowledge/frontend;
    index index.html;

    # 前端路由 - Next.js SSR
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # 后端 API
    location /api/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_read_timeout 60s;
        client_max_body_size 100m;
    }

    # Swagger API 文档
    location /swagger-ui/ {
        proxy_pass http://127.0.0.1:8080;
    }
    location /v3/api-docs {
        proxy_pass http://127.0.0.1:8080;
    }

    # 静态资源缓存
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|woff2|woff|ttf)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # 禁止访问隐藏文件
    location ~ /\. {
        deny all;
    }

    access_log /www/wwwlogs/jade-knowledge.log;
    error_log /www/wwwlogs/jade-knowledge-error.log;
}
