# ============================================================================
# 文件上传配置
# ============================================================================
# 上传的文件（轮播图、文章图片、视频等）保存到此目录。
#
# path       — 服务器磁盘上的物理存储路径（绝对路径或相对路径均可）
#              开发环境默认使用项目根目录下的 images/ 文件夹
#              ⚠️ 相对路径是相对于 JVM 工作目录，即 backend/ 的上级目录
#
# url-prefix — 前端访问上传文件的URL前缀，必须以 / 开头
#              前端拿到的 url 格式为: {url-prefix}/images/{文件名}
#              实际请求会被 WebMvcConfig 映射到磁盘文件
#
# 使用示例：
#   1. 启动后端，上传图片后返回 { "url": "/upload/2024/07/03/abc123.jpg" }
#   2. 前端拼接完整地址: http://localhost:8080/upload/2024/07/03/abc123.jpg
#   3. 后端 WebMvcConfig 将 /upload/** 映射到 images/ 目录，返回文件内容
#
# 实际存储路径示例:
#   D:/Users/不冷/jade_knowledge/backend/images/2024/07/03/abc123.jpg
#
# 自定义路径示例（取消注释并修改）：
#   path: D:/my-uploads          # Windows 绝对路径
#   path: /home/user/uploads     # Linux 绝对路径
#   path: ./my-custom-images     # 相对路径
# ============================================================================
upload:
  path: D:/Users/不冷/jade_knowledge/backend/images
  url-prefix: /upload

# 爬虫配置
crawl:
  max-concurrent: 3
  timeout-seconds: 30
  user-agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36
