# ============================================================================
# 文件上传配置（生产环境）
# ============================================================================
# 生产环境通过环境变量 UPLOAD_PATH 指定上传目录，默认为服务器上的 /data/uploads
# 部署时需确保该目录存在且有写入权限：mkdir -p /data/uploads
#
# 环境变量（在服务器 .env 或 systemd service 中配置）：
#   UPLOAD_PATH  — 文件存储的物理路径，默认 /data/uploads
#
# ⚠️ 生产环境务必使用绝对路径，避免因工作目录不同导致文件丢失
# ⚠️ Nginx 反向代理时需配置 /uploads/ 路径直接由 Nginx 提供静态文件（更高效）
#    参考 nginx 配置：
#    location /upload/ {
#        alias /data/uploads/;
#        expires 30d;
#        add_header Cache-Control "public, immutable";
#    }
# ============================================================================
upload:
  path: ${UPLOAD_PATH:/data/uploads}
  url-prefix: /upload

logging:
  level:
    com.jade: info
  file:
    name: logs/jade-knowledge.log
