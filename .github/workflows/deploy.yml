name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  SERVER_HOST: ${{ secrets.SERVER_HOST }}
  SERVER_USER: ${{ secrets.SERVER_USER }}
  DEPLOY_PATH: /www/wwwroot/jade-knowledge

jobs:
  build-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build Backend
        run: |
          cd backend
          mvn clean package -DskipTests -q

      - name: Upload backend artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: backend/target/*.jar

  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: cd frontend && npm install

      - name: Build frontend
        run: cd frontend && npm run build

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: |
            frontend/package.json
            frontend/package-lock.json
            frontend/.next/
            frontend/public/
            frontend/next.config.ts
          retention-days: 1

  deploy:
    needs: [build-backend, build-frontend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download backend artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-jar
          path: ./artifacts/backend

      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: ./artifacts/frontend

      - name: Deploy backend to Server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: 22
          source: "artifacts/backend/*.jar"
          target: ${{ env.DEPLOY_PATH }}/backend/
          strip_components: 3

      - name: Deploy frontend to Server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: 22
          source: "artifacts/frontend/*"
          target: ${{ env.DEPLOY_PATH }}/frontend/
          strip_components: 2

      - name: Restart Services
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: 22
          script: |
            cd /www/wwwroot/jade-knowledge

            # 停止旧后端
            if [ -f backend.pid ]; then
              kill $(cat backend.pid) 2>/dev/null || true
              rm -f backend.pid
              sleep 2
            fi
            pkill -f 'jade-knowledge' 2>/dev/null || true

            # 启动新后端
            JAR=$(ls backend/*.jar 2>/dev/null | head -1)
            if [ -n "$JAR" ]; then
              nohup java -jar "$JAR" --spring.profiles.active=prod > logs/backend.log 2>&1 &
              echo $! > backend.pid
              echo "✅ 后端启动完成 PID:$(cat backend.pid)"
            else
              echo "❌ 未找到 JAR 包"
            fi

            # 重启前端
            cd frontend
            npm install --production 2>/dev/null
            cd ..
            pm2 restart jade-frontend || cd frontend && pm2 start npm --name jade-frontend -- start

            echo "✅ 部署完成"
